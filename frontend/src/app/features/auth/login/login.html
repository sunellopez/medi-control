<div class="min-h-screen w-full flex items-center justify-center p-4 sm:p-8 bg-mc-bg-base relative overflow-hidden">

  <!-- Ambient light blobs matching the palette -->
  <div
    class="absolute top-[10%] left-[20%] w-96 h-96 bg-mc-primary-soft rounded-full mix-blend-multiply filter blur-[120px] opacity-80 animate-pulse">
  </div>
  <div
    class="absolute bottom-[10%] right-[10%] w-96 h-96 bg-mc-accent rounded-full mix-blend-multiply filter blur-[120px] opacity-50 animate-pulse"
    style="animation-delay: 3s;"></div>


  <div class="max-w-md w-full z-10 transition-all duration-500">
    <!-- Liquid Glass Card -->
    <div class="liquid-glass-panel rounded-[2rem] p-8 sm:p-10 text-mc-text-primary relative shadow-2xl">

      <!-- Back Arrow Prototype -->
      <div class="absolute top-8 left-8 cursor-pointer hover:opacity-75 transition-opacity">
        <i class="pi pi-arrow-left text-xl"></i>
      </div>

      <div class="mt-8 mb-10">
        <h1 class="text-3xl font-bold tracking-tight drop-shadow-md text-mc-text-primary">Bienvenido</h1>
        <p class="text-mc-text-secondary mt-2 text-sm font-medium">Ingresa tus datos para continuar</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">

        <div class="flex flex-col gap-2">
          <label for="email" class="text-mc-text-primary text-sm font-semibold ml-1">Email</label>
          <input id="email" type="email" pInputText formControlName="email" class="liquid-glass-input"
            placeholder="ejemplo@correo.com" autocomplete="email" />
        </div>

        <div class="flex flex-col gap-2">
          <label for="password" class="text-mc-text-primary text-sm font-semibold ml-1">Password</label>
          <p-password id="password" formControlName="password" [feedback]="false" [toggleMask]="true"
            styleClass="w-full" inputStyleClass="liquid-glass-input" placeholder="**********"></p-password>
        </div>

        @if (errorMessage) {
        <div
          class="bg-red-500/80 backdrop-blur-sm text-white text-sm font-semibold text-center rounded-xl p-3 border border-red-400/50 shadow-md">
          <i class="pi pi-exclamation-circle mr-2"></i>{{ errorMessage }}
        </div>
        } @else {
        <!-- Spacer to prevent layout shift -->
        <div class="h-[46px]"></div>
        }

        <p-button label="Iniciar Sesión" type="submit" styleClass="w-full liquid-glass-btn py-3 text-base mt-2"
          [loading]="isLoading"></p-button>

        <div class="mt-6 flex flex-col items-center gap-4">
          <span class="text-mc-text-secondary text-sm font-bold tracking-wide">Continuar Con</span>
          <div class="flex gap-4">
            <button type="button"
              class="w-10 h-10 liquid-glass-btn group !bg-[rgba(24,119,242,0.9)] border-white/50 shadow-md">
              <i class="pi pi-facebook text-white group-hover:scale-110 transition-transform"></i>
            </button>
            <button type="button"
              class="w-10 h-10 liquid-glass-btn group !bg-[rgba(29,161,242,0.9)] border-white/50 shadow-md">
              <i class="pi pi-twitter text-white group-hover:scale-110 transition-transform"></i>
            </button>
            <button type="button"
              class="w-10 h-10 liquid-glass-btn group !bg-[rgba(234,67,53,0.9)] border-white/50 shadow-md">
              <i class="pi pi-google text-white group-hover:scale-110 transition-transform"></i>
            </button>
          </div>
          <button type="button"
            class="mt-2 text-mc-text-primary hover:text-mc-primary-dark hover:underline transition-all text-sm font-bold">Registrarse</button>
        </div>
      </form>
    </div>
  </div>
</div>
