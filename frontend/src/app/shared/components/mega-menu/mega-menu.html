<nav class="liquid-glass-panel !rounded-2xl mx-4 mt-4 px-4 py-3 flex items-center justify-between">

  <!-- Brand -->
  <a routerLink="/dashboard" class="flex items-center gap-3 cursor-pointer hover:opacity-90 transition-opacity">
    <div class="w-10 h-10 rounded-xl liquid-glass-btn border-0 shadow-none flex flex-shrink-0 items-center justify-center">
      <i class="pi pi-heart-fill text-white text-xl"></i>
    </div>
    <span class="font-extrabold text-xl text-mc-text-primary tracking-tight hidden sm:block">MediControl</span>
  </a>

  <!-- Nav Items -->
  <ul class="flex items-center gap-1">
    @for (item of navItems; track item.route) {
      <li>
        <a
          [routerLink]="item.route"
          routerLinkActive="active-nav"
          class="nav-item relative flex flex-col items-center gap-0.5 px-4 py-2 rounded-xl font-bold text-sm text-mc-text-secondary hover:text-mc-text-primary hover:bg-white/20 transition-all group">
          <span class="flex items-center gap-2">
            <i [class]="'pi ' + item.icon + ' text-sm'"></i>
            <span class="hidden sm:inline">{{ item.label }}</span>
          </span>
          <!-- Active dot indicator -->
          <span class="active-dot w-1.5 h-1.5 rounded-full bg-mc-primary opacity-0 transition-all duration-300 scale-0"></span>
        </a>
      </li>
    }
  </ul>

  <!-- Right: user + logout -->
  <div class="flex items-center gap-3">
    <span class="text-sm font-bold text-mc-text-secondary hidden md:block">{{ authService.currentUser()?.name }}</span>
    <button
      class="liquid-glass-btn w-10 h-10 border-mc-glass-border hover:!bg-mc-primary-dark transition-all focus:outline-none group"
      (click)="logout()"
      title="Cerrar sesión">
      <i class="pi pi-sign-out text-white group-hover:scale-110 transition-transform"></i>
    </button>
  </div>

</nav>
