@if (loaderService.isLoading()) {
  <div class="fixed inset-0 z-[9999] flex items-center justify-center pointer-events-none">
    <!-- Blurred overlay -->
    <div class="absolute inset-0 bg-mc-bg-base/40 backdrop-blur-sm pointer-events-auto"></div>

    <!-- Spinner card -->
    <div class="relative z-10 liquid-glass-panel p-8 rounded-3xl flex flex-col items-center gap-4 shadow-2xl pointer-events-auto">
      <!-- Spinning ring -->
      <div class="relative w-16 h-16">
        <div class="absolute inset-0 rounded-full border-4 border-mc-glass-border"></div>
        <div class="absolute inset-0 rounded-full border-4 border-t-mc-primary border-r-transparent border-b-transparent border-l-transparent animate-spin"></div>
        <div class="absolute inset-2 rounded-full flex items-center justify-center">
          <i class="pi pi-heart-fill text-mc-primary text-xl animate-pulse"></i>
        </div>
      </div>
      <span class="text-mc-text-primary font-bold text-sm tracking-widest uppercase">Cargando...</span>
    </div>
  </div>
}
